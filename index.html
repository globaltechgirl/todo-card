<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.png" type="image/x-icon">
</head>

<body>

<article data-testid="test-todo-card">

  <div class="main">
    <div class="top">

      <input
        type="checkbox"
        id="todo-check"
        data-testid="test-todo-complete-toggle"
        aria-label="Mark task as complete"
      />

      <label for="todo-check" class="sr-only">Mark as complete</label>

      <div class="headers">

        <p class="task">YOUR TODOTASK</p>

        <h2 data-testid="test-todo-title">Design Landing Page</h2>

        <div
          id="todo-collapsible"
          data-testid="test-todo-collapsible-section"
          class="collapsed"
        >
          <p data-testid="test-todo-description">
            Create a modern responsive landing page for the new product launch.
          </p>
        </div>
      </div>

      <div class="row">

        <button
          type="button"
          data-testid="test-todo-expand-toggle"
          aria-expanded="false"
          aria-controls="todo-collapsible"
          class="badge expand"
        >
          Expand
        </button>

        <span
          data-testid="test-todo-priority"
          class="badge high"
          aria-label="Priority: High"
        >
          High
        </span>

        <div
          data-testid="test-todo-priority-indicator"
          class="priority-indicator high"
        ></div>

        <select
          data-testid="test-todo-status-control"
          aria-label="Task status"
          class="badge status status-in-progress"
        >
          <option>Pending</option>
          <option selected>In Progress</option>
          <option>Done</option>
        </select>

        <span
          data-testid="test-todo-status-display"
          class="badge status-display"
        >
          In Progress
        </span>

      </div>
    </div>

    <div class="time">

      <time
        data-testid="test-todo-due-date"
        datetime="2026-04-16T18:00:00Z"
      >
        Due Apr 16, 2026
      </time>

      <time>•</time>

      <time
        id="time-remaining"
        data-testid="test-todo-time-remaining"
        aria-live="polite"
      >
        Loading...
      </time>

      <time>•</time>

      <span
        data-testid="test-todo-overdue-indicator"
        class="hidden overdue"
      >
        Overdue
      </span>

    </div>

    <!-- TAGS -->
    <ul
      data-testid="test-todo-tags"
      class="tags"
      role="list"
    >
      <li data-testid="test-todo-tag-work" class="tag">work</li>
      <li data-testid="test-todo-tag-urgent" class="tag">urgent</li>
      <li data-testid="test-todo-tag-design" class="tag">design</li>
    </ul>

    <div class="actions">

      <button
        type="button"
        data-testid="test-todo-edit-button"
        class="edit"
        aria-label="Edit task"
      >
        Edit
      </button>

      <button
        type="button"
        data-testid="test-todo-delete-button"
        class="delete"
        aria-label="Delete task"
      >
        Delete
      </button>

    </div>
  </div>

  <form
    data-testid="test-todo-edit-form"
    class="edit-form hidden"
  >

    <div class="forms">

      <label for="edit-title">Title</label>
      <input
        id="edit-title"
        data-testid="test-todo-edit-title-input"
        type="text"
      />

      <label for="edit-desc">Description</label>
      <textarea
        id="edit-desc"
        data-testid="test-todo-edit-description-input"
      ></textarea>

      <label for="edit-priority">Priority</label>
      <select
        id="edit-priority"
        data-testid="test-todo-edit-priority-select"
      >
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>

      <label for="edit-date">Due Date</label>
      <input
        type="datetime-local"
        id="edit-date"
        data-testid="test-todo-edit-due-date-input"
      />

    </div>

    <div class="actions">

      <button
        type="button"
        data-testid="test-todo-save-button"
        class="edit"
      >
        Save
      </button>

      <button
        type="button"
        data-testid="test-todo-cancel-button"
        class="delete"
      >
        Cancel
      </button>

    </div>

  </form>

</article>

<div class="corner top-left">HNG14</div>
<div class="corner top-right">11/04</div>
<div class="corner bottom-left">@globaltechgirl</div>
<div class="corner bottom-right">Frontend Stage 1a</div>

<script src="script.js" defer></script>

</body>
</html>
