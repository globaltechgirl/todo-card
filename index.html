<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.png" type="image/x-icon">
</head>

<body>

<article data-testid="test-todo-card">

  <div class="top">
    <input
      type="checkbox"
      id="todo-check"
      data-testid="test-todo-complete-toggle"
      aria-label="Mark task as complete"
    />
    <label for="todo-check" class="sr-only">Mark as complete</label>

    <div class="headers">
      <p class="task">
        YOUR TODOTASK
      </p>

      <h2 data-testid="test-todo-title">Design Landing Page</h2>

      <p data-testid="test-todo-description">
        Create a modern responsive landing page for the new product launch.
      </p>
    </div>

    <div class="row">
      <span
        class="badge high"
        data-testid="test-todo-priority"
        aria-label="Priority: High"
      >
        High
      </span>

      <span
        id="status"
        class="badge status"
        data-testid="test-todo-status"
        aria-label="Status: In Progress"
      >
        In Progress
      </span>
    </div>
  </div>

  <div class="time">
    <time
      data-testid="test-todo-due-date"
      datetime="2026-04-16T18:00:00Z"
    >
      Due Apr 16, 2026 
    </time>

    <time>•</time>
      
    <time
      id="time-remaining"
      data-testid="test-todo-time-remaining"
      aria-live="polite"
      datetime=""
    >
      Loading...
    </time>
  </div>

  <ul
    data-testid="test-todo-tags"
    class="tags"
    role="list"
  >
    <li class="tag" data-testid="test-todo-tag-work">work</li>
    <li class="tag" data-testid="test-todo-tag-urgent">urgent</li>
    <li class="tag" data-testid="test-todo-tag-design">design</li>
  </ul>

  <div class="actions">
    <button
      data-testid="test-todo-edit-button"
      class="edit"
      aria-label="Edit task"
    >
      Edit
    </button>

    <button
      data-testid="test-todo-delete-button"
      class="delete"
      aria-label="Delete task"
    >
      Delete
    </button>
  </div>

</article>

<div class="corner top-left">HNG14</div>
<div class="corner top-right">11/04</div>
<div class="corner bottom-left">@globaltechgirl</div>
<div class="corner bottom-right">Frontend Stage 0</div>

<script src="script.js" defer></script>
</body>
</html>
